<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b0764"/>
      <stop offset="50%" stop-color="#1e1060"/>
      <stop offset="100%" stop-color="#0d0630"/>
    </linearGradient>
    <linearGradient id="lci" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="100%" stop-color="#a5f3fc"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="160" fill="url(#bg)"/>

  <!-- Subtle geometric accent lines -->
  <line x1="100" y1="200" x2="400" y2="500" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
  <line x1="624" y1="100" x2="924" y2="400" stroke="#7c3aed" stroke-width="1.5" opacity="0.3"/>
  <line x1="50" y1="700" x2="350" y2="950" stroke="#06b6d4" stroke-width="1" opacity="0.2"/>
  <line x1="700" y1="600" x2="1000" y2="900" stroke="#06b6d4" stroke-width="1" opacity="0.2"/>
  <line x1="200" y1="100" x2="800" y2="200" stroke="#a855f7" stroke-width="1" opacity="0.15"/>
  <line x1="150" y1="900" x2="850" y2="800" stroke="#a855f7" stroke-width="1" opacity="0.15"/>

  <!-- Dot nodes on lines -->
  <circle cx="400" cy="500" r="5" fill="#67e8f9" opacity="0.5"/>
  <circle cx="624" cy="100" r="5" fill="#67e8f9" opacity="0.5"/>
  <circle cx="100" cy="200" r="4" fill="#a5f3fc" opacity="0.4"/>
  <circle cx="924" cy="400" r="4" fill="#a5f3fc" opacity="0.4"/>
  <circle cx="350" cy="950" r="4" fill="#67e8f9" opacity="0.3"/>
  <circle cx="700" cy="600" r="3" fill="#c4b5fd" opacity="0.4"/>

  <!-- LCI text -->
  <text
    x="512" y="560"
    text-anchor="middle"
    font-family="Arial Black, Arial, sans-serif"
    font-size="380"
    font-weight="900"
    fill="url(#lci)"
    filter="url(#glow)"
    letter-spacing="-8"
  >LCI</text>

  <!-- MARKETING text -->
  <text
    x="512" y="680"
    text-anchor="middle"
    font-family="Arial, sans-serif"
    font-size="88"
    font-weight="700"
    fill="white"
    opacity="0.85"
    letter-spacing="18"
  >MARKETING</text>
</svg>
